name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - '.mvn/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.gitignore'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and generate coverage
        run: ./mvnw -B verify

      - name: Upload JaCoCo HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: target/site/jacoco
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          use_oidc: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DEPLOYMENT_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg PORT=${{ vars.HTTP_PORT || '8080' }} \
            --build-arg COLOMBO_FTP_PORT=${{ vars.COLOMBO_FTP_PORT || '21' }} \
            --build-arg COLOMBO_FTP_PASSIVE_PORTS=${{ vars.COLOMBO_FTP_PASSIVE_PORTS || '60000-60100' }} \
            -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to target host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            /bin/bash -lc '
              set -e
              FTP_PASSIVE_EXTERNAL_ADDRESS="${{ vars.COLOMBO_FTP_PASSIVE_EXTERNAL_ADDRESS }}"
              # Ensure PASV advertises a concrete IPv4.
              # Priority:
              # 1) COLOMBO_FTP_PASSIVE_EXTERNAL_ADDRESS variable (IP or hostname)
              # 2) DEPLOY_HOST secret (IP or hostname)
              if [ -z "$FTP_PASSIVE_EXTERNAL_ADDRESS" ]; then
                FTP_PASSIVE_EXTERNAL_ADDRESS="${{ secrets.DEPLOY_HOST }}"
                echo "COLOMBO_FTP_PASSIVE_EXTERNAL_ADDRESS not set; falling back to DEPLOY_HOST"
              fi
              if [ -z "$FTP_PASSIVE_EXTERNAL_ADDRESS" ]; then
                echo "ERROR: passive external address is empty (both COLOMBO_FTP_PASSIVE_EXTERNAL_ADDRESS and DEPLOY_HOST)"
                exit 1
              fi
              if ! echo "$FTP_PASSIVE_EXTERNAL_ADDRESS" | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$"; then
                RESOLVED_IP="$(getent ahostsv4 "$FTP_PASSIVE_EXTERNAL_ADDRESS" | awk "{print \$1}" | head -n 1)"
                if [ -z "$RESOLVED_IP" ]; then
                  echo "ERROR: Failed to resolve passive external address ($FTP_PASSIVE_EXTERNAL_ADDRESS) to IPv4"
                  exit 1
                fi
                FTP_PASSIVE_EXTERNAL_ADDRESS="$RESOLVED_IP"
              fi
              echo "Using FTP passive external address: ${FTP_PASSIVE_EXTERNAL_ADDRESS:-<unset>}"

              docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.DEPLOYMENT_TOKEN }}
              docker pull ghcr.io/${{ github.repository }}:latest

              docker stop colombo-backend || true
              docker rm colombo-backend || true

              docker run -d --name colombo-backend \
                -p ${{ vars.HTTP_PORT }}:${{ vars.HTTP_PORT }} \
                -p ${{ vars.COLOMBO_FTP_PORT }}:${{ vars.COLOMBO_FTP_PORT }} \
                -p ${{ vars.COLOMBO_FTP_PASSIVE_PORTS }}:${{ vars.COLOMBO_FTP_PASSIVE_PORTS }} \
                -e PORT=${{ vars.HTTP_PORT }} \
                -e COLOMBO_FTP_PORT=${{ vars.COLOMBO_FTP_PORT }} \
                -e COLOMBO_FTP_PASSIVE_PORTS=${{ vars.COLOMBO_FTP_PASSIVE_PORTS }} \
                -e COLOMBO_FTP_PASSIVE_EXTERNAL_ADDRESS=${FTP_PASSIVE_EXTERNAL_ADDRESS} \
                -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
                -e DATABASE_USER=${{ secrets.DATABASE_USER }} \
                -e DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
                -e JPA_DDL_AUTO=${{ vars.JPA_DDL_AUTO }} \
                -e FLYWAY_ENABLED=${{ vars.FLYWAY_ENABLED }} \
                -e FLYWAY_BASELINE_ON_MIGRATE=${{ vars.FLYWAY_BASELINE_ON_MIGRATE }} \
                --restart=always \
                ghcr.io/${{ github.repository }}:latest
            '
