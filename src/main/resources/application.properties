spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.application.name=colombo
server.port=${PORT:8080}

colombo.ftp.port=${COLOMBO_FTP_PORT:2121}
colombo.ftp.passive-ports=${COLOMBO_FTP_PASSIVE_PORTS:60000-60100}
spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/colombo}}
spring.datasource.username=${DATABASE_USER:${DB_USERNAME:colombo}}
spring.datasource.password=${DATABASE_PASSWORD:${DB_PASSWORD:colombo}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=0